packages:
  - apps/*
  - libs/*

# protobufjs@7.6.4 was published 2026-06-12; remove this exclusion after 2026-06-13
minimumReleaseAgeExclude:
  - protobufjs

overrides:
  'protobufjs@<7.5.5': ^7.5.5
  'fast-xml-parser@<4.5.4': ^4.5.4
  'basic-ftp@<5.2.0': ^5.2.0
  'vitest@<3.2.6': ^3.2.6
  '@vitest/ui@<3.2.6': ^3.2.6
  '@vitest/coverage-v8@<3.2.6': ^3.2.6

allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  cypress: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  protobufjs: true
  puppeteer: true
  re2: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@firebase/util'
  - '@parcel/watcher'
  - '@sentry/capacitor'
  - '@sentry/cli'
  - '@swc/core'
  - cypress
  - esbuild
  - less
  - lmdb
  - msgpackr-extract
  - nx
  - protobufjs
  - puppeteer
  - re2
  - unrs-resolver
