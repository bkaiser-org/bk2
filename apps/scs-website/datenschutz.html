<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datenschutz – Seeclub Stäfa</title>
  <link rel="stylesheet" href="assets/tailwind.css?v=1" />
  <link rel="stylesheet" href="assets/styles.css?v=2-selfhost-fonts" />
</head>
<body class="bg-white text-slate-800 dark:bg-slate-950 dark:text-slate-200 antialiased">

  <div id="site-header"></div>

  <section class="py-16 md:py-20 bg-gradient-to-b from-slate-50 to-white dark:from-slate-900 dark:to-slate-950">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
      <h1 class="font-display text-4xl md:text-5xl font-bold mt-2 mb-3">Datenschutz</h1>
    </div>
  </section>

  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12" id="page-content">
    <div class="animate-pulse space-y-4">
      <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
      <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/shared.js"></script>
  <script src="assets/api.js"></script>
  <script>
    function renderSection(sec) {
      if (sec.type === 'table') {
        const rows = sec.rows.map(r => `
          <tr class="border-b border-slate-100 dark:border-slate-800">
            <td class="py-2 pr-6 font-semibold text-slate-700 dark:text-slate-300 align-top whitespace-nowrap w-1/3">${r.label}</td>
            <td class="py-2 text-slate-600 dark:text-slate-400">${r.value}</td>
          </tr>`).join('');
        return `
          ${sec.title ? `<h2 class="font-display text-xl font-bold mt-8 mb-4">${sec.title}</h2>` : ''}
          ${sec.subTitle ? `<p class="text-slate-500 dark:text-slate-400 text-sm mb-4">${sec.subTitle}</p>` : ''}
          <table class="w-full text-sm"><tbody>${rows}</tbody></table>`;
      }
      return `
        ${sec.title ? `<h2 class="font-display text-xl font-bold mt-8 mb-3">${sec.title}</h2>` : ''}
        ${sec.subTitle ? `<p class="text-slate-500 dark:text-slate-400 text-sm mb-3">${sec.subTitle}</p>` : ''}
        <div class="prose-scs text-slate-700 dark:text-slate-300">${sec.content || ''}</div>`;
    }

    window.scsPageInit = async () => {
      const data = await SCS_API.page('privacy');
      const el = document.getElementById('page-content');
      if (!data) {
        el.innerHTML = '<p class="text-slate-500">Inhalt konnte nicht geladen werden.</p>';
        return;
      }
      el.innerHTML = data.sections.map(renderSection).join('\n<hr class="my-8 border-slate-100 dark:border-slate-800" />\n');
    };
    window.scsReRender = window.scsPageInit;
  </script>
</body>
</html>
